<!DOCTYPE html>
<html>
<head>
  <title>PrayunaSocial</title>
  <style>
    body { font-family: Arial; background: #f0f0f0; padding: 20px; }
    header { display: flex; align-items: center; margin-bottom: 20px; }
    header img { width: 50px; height: 50px; margin-right: 10px; }
    h1 { color: #333; }

    input, textarea { width: 100%; padding: 10px; margin: 5px 0; }
    button { padding: 10px; background: #4CAF50; color: white; border: none; cursor: pointer; }
    
    #posts, #chat { margin-top: 20px; }
    .post, .chatMessage { background: white; padding: 10px; margin-bottom: 10px; border-radius: 5px; }
    #chatContainer { border-top: 2px solid #ccc; padding-top: 20px; }
  </style>
</head>
<body>

  <!-- Logo and Title -->
  <header>
    <img src="https://i.imgur.com/5bXlYpM.png" alt="PrayunaSocial Logo">
    <h1>Welcome to PrayunaSocial!</h1>
  </header>

  <!-- Post Box -->
  <input type="text" id="postBox" placeholder="Write your post here...">
  <button id="postButton">Post</button>
  <div id="posts"></div>

  <!-- Chat Box -->
  <div id="chatContainer">
    <h2>Chat</h2>
    <textarea id="chatBox" placeholder="Type a message..."></textarea>
    <button id="chatButton">Send</button>
    <div id="chat"></div>
  </div>

  <script>
    // Post Function
    const postButton = document.getElementById("postButton");
    const postBox = document.getElementById("postBox");
    const postsDiv = document.getElementById("posts");

    postButton.onclick = function() {
      if(postBox.value.trim() !== "") {
        const newPost = document.createElement("div");
        newPost.className = "post";
        newPost.innerText = postBox.value;
        postsDiv.prepend(newPost);
        postBox.value = "";
      }
    }

    // Chat Function
    const chatButton = document.getElementById("chatButton");
    const chatBox = document.getElementById("chatBox");
    const chatDiv = document.getElementById("chat");

    chatButton.onclick = function() {
      if(chatBox.value.trim() !== "") {
        const newMessage = document.createElement("div");
        newMessage.className = "chatMessage";
        newMessage.innerText = chatBox.value;
        chatDiv.appendChild(newMessage);
        chatBox.value = "";
      }
    }
  </script>

</body>
</html>
